[features]
default = []

## Enable audio processing (Opus, Vorbis, FLAC, PCM codecs)
audio = ["dep:oximedia-audio"]

## Enable video codec support (AV1, VP9, VP8)
video = ["dep:oximedia-codec"]

## Enable filter graph pipeline
graph = ["dep:oximedia-graph"]

## Enable professional audio effects suite
effects = ["dep:oximedia-effects"]

## Enable network streaming (HLS, DASH, SRT, RTMP, WebRTC)
net = ["dep:oximedia-net"]

## Enable broadcast-standard audio loudness metering (EBU R128, ATSC A/85)
metering = ["dep:oximedia-metering"]

## Enable loudness normalization (EBU R128, streaming platform targets)
normalize = ["dep:oximedia-normalize", "metering"]

## Enable video quality metrics (PSNR, SSIM, VMAF, NIQE, BRISQUE)
quality = ["dep:oximedia-quality"]

## Enable extended metadata support (ID3v2, Vorbis, XMP, EXIF, IPTC)
metadata-ext = ["dep:oximedia-metadata"]

## Enable SMPTE timecode reading/writing (LTC, VITC)
timecode = ["dep:oximedia-timecode"]

## Enable DAG-based workflow orchestration engine
workflow = ["dep:oximedia-workflow"]

## Enable batch processing engine with job queuing
batch = ["dep:oximedia-batch"]

## Enable system monitoring, alerting, and metrics
monitor = ["dep:oximedia-monitor"]

## Enable 1D/3D LUT processing and HDR pipeline
lut = ["dep:oximedia-lut"]

## Enable professional color management (ICC, ACES, HDR, gamut mapping)
colormgmt = ["dep:oximedia-colormgmt"]

## Enable full-featured transcoding pipeline
transcode = ["dep:oximedia-transcode"]

## Enable subtitle rendering (SRT, ASS, WebVTT)
subtitle = ["dep:oximedia-subtitle"]

## Enable closed captions support (SRT, WebVTT, SCC, TTML, and more)
captions = ["dep:oximedia-captions"]

## Enable media archive verification and long-term preservation
archive = ["dep:oximedia-archive"]

## Enable media deduplication and duplicate detection
dedup = ["dep:oximedia-dedup"]

## Enable media search and indexing engine
search = ["dep:oximedia-search"]

## Enable Media Asset Management (MAM) system
mam = ["dep:oximedia-mam"]

## Enable AI-powered scene understanding and video analysis
scene = ["dep:oximedia-scene"]

## Enable shot detection, classification, and analysis
shots = ["dep:oximedia-shots"]

## Enable professional broadcast video scopes (waveform, vectorscope, histogram)
scopes = ["dep:oximedia-scopes"]

## Enable visual effects and compositing (transitions, keying, particles, generators)
vfx = ["dep:oximedia-vfx"]

## Enable advanced image processing (DPX, OpenEXR, TIFF, ICC, DNG, XMP, pyramid, tone curves)
image-ext = ["dep:oximedia-image"]

## Enable perceptual watermark embedding and forensic detection
watermark = ["dep:oximedia-watermark"]

## Enable Music Information Retrieval (beat tracking, key detection, fingerprinting, MIR features)
mir = ["dep:oximedia-mir"]

## Enable content recommendation engine with collaborative and content-based filtering
recommend = ["dep:oximedia-recommend"]

## Enable broadcast playlist management, scheduling, and automation
playlist = ["dep:oximedia-playlist"]

## Enable broadcast playout server with ad insertion and SCTE-35 scheduling
playout = ["dep:oximedia-playout"]

## Enable digital rights management and licensing metadata
rights = ["dep:oximedia-rights"]

## Enable collaborative media review and approval workflow
review = ["dep:oximedia-review"]

## Enable audio/video restoration (click/crackle removal, telecine correction)
restore = ["dep:oximedia-restore"]

## Enable media file repair and recovery from corruption
repair = ["dep:oximedia-repair"]

## Enable multi-camera sync and angle switching
multicam = ["dep:oximedia-multicam"]

## Enable video stabilization (motion analysis, smoothing, and correction)
stabilize = ["dep:oximedia-stabilize"]

## Enable cloud storage and processing abstraction (S3, Azure Blob, GCS)
cloud = ["dep:oximedia-cloud"]

## Enable EDL (Edit Decision List) parsing and generation (CMX 3600, GVG, BVE)
edl = ["dep:oximedia-edl"]

## Enable NDI (Network Device Interface) protocol support for low-latency IP video
ndi = ["dep:oximedia-ndi"]

## Enable IMF (Interoperable Master Format) package support (SMPTE ST 2067)
imf = ["dep:oximedia-imf"]

## Enable AAF (Advanced Authoring Format) interchange (SMPTE ST 377-1)
aaf = ["dep:oximedia-aaf"]

## Enable PTP/NTP time synchronization for broadcast production
timesync = ["dep:oximedia-timesync"]

## Enable media forensics analysis and tampering detection
forensics = ["dep:oximedia-forensics"]

## Enable hardware acceleration (Vulkan GPU compute, CPU fallback)
accel = ["dep:oximedia-accel"]

## Enable SIMD-optimised media kernels (DCT, SAD, interpolation)
simd = ["dep:oximedia-simd"]

## Enable professional live video switcher (M/E rows, keyers, DVE, tally)
switcher = ["dep:oximedia-switcher"]

## Enable multi-track timeline editor with frame-accurate editing
timeline = ["dep:oximedia-timeline"]

## Enable codec optimisation suite (RDO, psychovisual, AQ, motion search)
optimize = ["dep:oximedia-optimize"]

## Enable performance profiling tools (CPU/GPU/memory/frame timing)
profiler = ["dep:oximedia-profiler"]

## Enable distributed render farm coordinator
renderfarm = ["dep:oximedia-renderfarm"]

## Enable cloud-agnostic object storage abstraction (S3, Azure, GCS, local)
storage = ["dep:oximedia-storage"]

## Enable real-time CRDT-based collaborative editing
collab = ["dep:oximedia-collab"]

## Enable game streaming and screen capture optimisation
gaming = ["dep:oximedia-gaming"]

## Enable virtual production and LED wall tools
virtual-prod = ["dep:oximedia-virtual"]

## Enable accessibility tools (audio description, captions, compliance)
access = ["dep:oximedia-access"]

## Enable media conforming (EDL/XML/AAF timeline-to-media matching)
conform = ["dep:oximedia-conform"]

## Enable media format conversion utilities
convert = ["dep:oximedia-convert"]

## Enable broadcast automation and master control system
automation = ["dep:oximedia-automation"]

## Enable professional clip management and logging
clips = ["dep:oximedia-clips"]

## Enable proxy and offline editing workflow system
proxy = ["dep:oximedia-proxy"]

## Enable encoding preset library (200+ platform/broadcast presets)
presets = ["dep:oximedia-presets"]

## Enable professional color calibration and matching tools
calibrate = ["dep:oximedia-calibrate"]

## Enable spatial and temporal video denoising
denoise = ["dep:oximedia-denoise"]

## Enable video alignment and registration (temporal, spatial, feature)
align = ["dep:oximedia-align"]

## Enable comprehensive media analysis and quality assessment
analysis = ["dep:oximedia-analysis"]

## Enable professional audio post-production (ADR, Foley, mixing, stems)
audiopost = ["dep:oximedia-audiopost"]

## Enable broadcast-grade quality control and delivery validation
qc = ["dep:oximedia-qc"]

## Enable job queue and worker management for media transcoding
jobs = ["dep:oximedia-jobs"]

## Enable automated video editing (highlight detection, smart cutting, assembly)
auto = ["dep:oximedia-auto"]

## Enable video timeline editor with effects, transitions, and rendering
edit = ["dep:oximedia-edit"]

## Enable signal routing, NMOS IS-04/IS-05/IS-07, matrix crosspoints
routing = ["dep:oximedia-routing"]

## Enable advanced audio analysis: spectral, voice, music, forensics, pitch, formant
audio-analysis = ["dep:oximedia-audio-analysis"]

## Enable GPU compute pipeline (WGPU: Vulkan, Metal, DX12, WebGPU) for media acceleration
gpu = ["dep:oximedia-gpu"]

## Enable HLS/DASH adaptive streaming packaging (manifests, segments, encryption)
packager = ["dep:oximedia-packager"]

## Enable CENC DRM, Widevine, PlayReady, FairPlay, Clear Key content protection
drm = ["dep:oximedia-drm"]

## Enable professional digital preservation (BagIt, OAIS, PREMIS, METS, fixity)
archive-pro = ["dep:oximedia-archive-pro"]

## Enable distributed encoding coordinator (multi-node, load balancing, fault tolerance)
distributed = ["dep:oximedia-distributed"]

## Enable render farm coordinator (gRPC, priority scheduling, SQLite persistence)
farm = ["dep:oximedia-farm"]

## Enable Dolby Vision RPU metadata parser/writer (Profiles 5/7/8/8.1/8.4)
dolbyvision = ["dep:oximedia-dolbyvision"]

## Enable professional digital audio mixer (100+ channels, automation, effects buses)
mixer = ["dep:oximedia-mixer"]

## Enable high-quality video scaling (bilinear, bicubic, Lanczos, super-resolution)
scaling = ["dep:oximedia-scaling"]

## Enable broadcast graphics engine (lower thirds, tickers, keyframe animation)
graphics = ["dep:oximedia-graphics"]

## Enable patent-free video-over-IP transport (VP9/AV1, mDNS discovery, FEC)
videoip = ["dep:oximedia-videoip"]

## Enable FFmpeg CLI argument compatibility layer (argument translation to OxiMedia)
compat-ffmpeg = ["dep:oximedia-compat-ffmpeg"]

## Enable dynamic and static codec plugin system
plugin = ["dep:oximedia-plugin"]

## Enable RESTful media server (JWT auth, HLS/DASH streaming, WebSocket updates)
server = ["dep:oximedia-server"]

## Enable HDR video processing (PQ/HLG transfer functions, tone mapping, HDR10+ metadata)
hdr = ["dep:oximedia-hdr"]

## Enable spatial audio processing (Ambisonics, binaural HRTF, room simulation)
spatial = ["dep:oximedia-spatial"]

## Enable high-performance caching infrastructure (LRU, tiered cache, predictive warming)
cache = ["dep:oximedia-cache"]

## Enable adaptive streaming pipeline, segment lifecycle, and stream health monitoring
stream = ["dep:oximedia-stream"]

## Enable video processing algorithms: scene detection, pulldown detection, temporal denoising, perceptual fingerprinting
video-proc = ["dep:oximedia-video"]

## Enable CDN edge management, cache invalidation, geographic routing, and origin failover
cdn = ["dep:oximedia-cdn"]

## Enable lightweight neural network inference for media: tensor ops, conv2d, scene classification
neural = ["dep:oximedia-neural"]

## Enable 360° VR video processing: equirectangular/cubemap projections, fisheye, stereo 3D
vr360 = ["dep:oximedia-360"]

## Enable media engagement analytics: session tracking, retention curves, A/B testing, scoring
analytics = ["dep:oximedia-analytics"]

## Enable advanced caption generation: speech alignment, WCAG compliance, speaker diarization
caption-gen = ["dep:oximedia-caption-gen"]

## Enable image transformation (resize, crop, rotate, flip, color conversion)
image-transform = ["dep:oximedia-image-transform"]

## Enable Motion JPEG (MJPEG) intra-frame video codec
mjpeg = ["dep:oximedia-codec", "oximedia-codec/mjpeg"]

## Enable APV (Advanced Professional Video) intra-frame codec (ISO/IEC 23009-13)
apv = ["dep:oximedia-codec", "oximedia-codec/apv"]


[package]
name = "oximedia"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Patent-free multimedia framework for Rust"
categories = ["multimedia", "multimedia::video", "multimedia::audio", "multimedia::encoding", "multimedia::images"]
keywords = ["multimedia", "video", "audio", "codec", "media"]

[lints]
workspace = true

[dependencies]
# Always-on core crates
oximedia-core.workspace = true
oximedia-io.workspace = true
oximedia-container.workspace = true
oximedia-cv.workspace = true

# Optional feature-gated crates
oximedia-audio = { workspace = true, optional = true }
oximedia-codec = { workspace = true, optional = true }
oximedia-graph = { workspace = true, optional = true }
oximedia-effects = { workspace = true, optional = true }
oximedia-net = { workspace = true, optional = true }
oximedia-metering = { workspace = true, optional = true }
oximedia-normalize = { workspace = true, optional = true }
oximedia-quality = { workspace = true, optional = true }
oximedia-metadata = { workspace = true, optional = true }
oximedia-timecode = { workspace = true, optional = true }
oximedia-workflow = { workspace = true, optional = true, features = ["sqlite"] }
oximedia-batch = { workspace = true, optional = true }
oximedia-monitor = { workspace = true, optional = true }
oximedia-lut = { workspace = true, optional = true }
oximedia-colormgmt = { workspace = true, optional = true }
oximedia-transcode = { workspace = true, optional = true }
oximedia-subtitle = { workspace = true, optional = true }
oximedia-captions = { workspace = true, optional = true }
oximedia-archive = { workspace = true, optional = true }
oximedia-dedup = { workspace = true, optional = true, features = ["sqlite"] }
oximedia-search = { workspace = true, optional = true }
oximedia-mam = { workspace = true, optional = true }
oximedia-scene = { workspace = true, optional = true }
oximedia-shots = { workspace = true, optional = true }
oximedia-scopes = { workspace = true, optional = true }
oximedia-vfx = { workspace = true, optional = true }
oximedia-image = { workspace = true, optional = true }
oximedia-watermark = { workspace = true, optional = true }
oximedia-mir = { workspace = true, optional = true }

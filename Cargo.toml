# The Python extension crate (`oximedia-py`) produces a cdylib whose linker
# output names (`oximedia.dll`, `oximedia.pdb`, `liboximedia.rlib`) collide
# with the `oximedia-cli` binary and the `oximedia` umbrella crate. PyO3
# requires the cdylib filename match the `#[pymodule] fn oximedia` symbol, so
# the crate cannot be renamed; instead it is built explicitly via maturin
# (`maturin build -m crates/oximedia-py/Cargo.toml`) or `cargo build -p
# oximedia-py`. Excluding it from `default-members` keeps plain `cargo build`
# from racing three crates onto the same output filenames.
default-members = [
    "crates/oximedia-core",

numpy = "0.28"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "bmp", "tiff"] }
serde_yaml_ng = "0.10"
toml = "1.1"

# Web framework (workspace-wide)
axum = { version = "0.8", features = ["ws", "macros", "multipart"] }
tower = { version = "0.5", features = ["util", "timeout", "load-shed", "limit"] }
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }
tokio-util = { version = "0.7", features = ["io", "codec"] }

# GPU compute
wgpu = "29.0"
bytemuck = { version = "1.25", features = ["derive"] }
pollster = "0.4"

# Scripting
mlua = { version = "0.11", features = ["lua54", "vendored", "async", "serialize"] }

# Logging
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }

# Search
tantivy = "0.26"

# Dynamic loading
libloading = "0.9"

# Python bindings
pyo3 = { version = "0.28", features = ["extension-module"] }

# COOLJAPAN serialization
oxicode = { version = "0.2.3", features = ["serde"] }

# Code generation (build-dep)
syn = { version = "2", features = ["full"] }

# xxhash (union of xxh64 + xxh3)
xxhash-rust = { version = "0.8", features = ["xxh64", "xxh3"] }

# GPU monitoring
nvml-wrapper = "0.12"

# Email
lettre = { version = "0.11", default-features = false, features = ["tokio1", "tokio1-rustls-tls", "builder", "smtp-transport"] }

# Authentication
argon2 = { version = "0.5", features = ["std"] }
password-hash = { version = "0.6", features = ["getrandom"] }

# URL parsing
url = { version = "2.5", features = ["serde"] }

# Ordered collections
indexmap = { version = "2.14", features = ["serde"] }

# Image codecs (patent-free)
png = "0.18"
jpeg-decoder = "0.3"

# GraphQL and actix
actix-web = { version = "4", features = ["rustls-0_23"] }
async-graphql = { version = "7", features = ["uuid", "chrono"] }

# Google Cloud extras
google-cloud-wkt = "1"
google-cloud-auth = { version = "1.10", default-features = false }

# AWS SDK extras
aws-sdk-mediaconvert = { version = "1.126", default-features = false, features = ["rustls", "rt-tokio"] }
aws-sdk-mediapackage = { version = "1.98", default-features = false, features = ["rustls", "rt-tokio"] }
aws-sdk-sts = { version = "1.103", default-features = false, features = ["rustls", "rt-tokio"] }

# Encryption
cbc = "0.2"
block-padding = "0.4"

# Metal GPU (macOS/iOS only — optional)
metal = "0.33"
